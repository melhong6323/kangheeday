<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>앙희데이</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════
       RESET & TOKENS
    ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #FDFBF7;
      --surface:        rgba(255,255,255,0.60);
      --border:         rgba(0,0,0,0.08);
      --border-light:   rgba(255,255,255,0.75);
      --text:           #4A3F35;
      --text-muted:     #7A6F65;
      --text-dim:       #B5AAA2;
      --accent:         #FF8C78;
      --accent2:        #5DCEA8;
      --accent3:        #F0C84A;
      --shadow-clay:    6px 6px 14px rgba(0,0,0,0.10), -4px -4px 10px rgba(255,255,255,0.80);
      --shadow-press:   2px 2px 5px rgba(0,0,0,0.10), -1px -1px 4px rgba(255,255,255,0.70);
      --panel-w:        268px;
      --gap:            10px;
      --card-b-img:     linear-gradient(135deg, #FFB5A7 0%, #F9E79F 55%, #A3E4D7 100%);
      --card-f-img:     linear-gradient(160deg, rgba(255,255,255,0.90) 0%, rgba(240,248,245,0.92) 100%);
      /* ── 폰트 크기 토큰 ── */
      --fs-label:       0.85rem;
      --fs-body:        0.95rem;
      --fs-sm:          0.90rem;
      --fs-nav:         0.90rem;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: var(--bg);
      background-image: url("bg_props.webp");
      background-size: 700px auto;
      background-position: center;
      background-repeat: no-repeat;
      font-family: 'Pretendard', -apple-system, sans-serif;
      color: var(--text);
      font-size: 15px;
    }

    /* ══════════════════════════════════════
       3-COLUMN DASHBOARD LAYOUT
    ══════════════════════════════════════ */
    .dashboard {
      display: grid;
      grid-template-columns: var(--panel-w) 1fr var(--panel-w);
      height: 100vh;
    }

    /* ── Panels ── */
    .panel {
      display: flex;
      flex-direction: column;
      padding: 16px 14px;
      gap: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.50);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.80);
      box-shadow: var(--shadow-clay);
    }
    .panel-left  { border-right: 1px solid rgba(0,0,0,0.07); }
    .panel-right { border-left:  1px solid rgba(0,0,0,0.07); }

    /* ── Center ── */
    .center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       LEFT PANEL — INPUT / SETTINGS
    ══════════════════════════════════════ */
    .panel-label {
      font-size: var(--fs-label);
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .num-input {
      width: 100%;
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 8px 12px;
      outline: none;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.06), inset -1px -1px 4px rgba(255,255,255,0.80);
      transition: border-color 0.15s;
    }
    .num-input:focus { border-color: var(--accent); }

    .textarea-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .nickname-textarea {
      flex: 1;
      width: 100%;
      min-height: 0;
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92rem;
      line-height: 1.65;
      padding: 10px 12px;
      resize: none;
      outline: none;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.06), inset -1px -1px 4px rgba(255,255,255,0.80);
      transition: border-color 0.15s;
    }
    .nickname-textarea:focus { border-color: var(--accent); }
    .nickname-textarea::placeholder { color: var(--text-dim); }

    /* ══════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: var(--fs-body);
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled)  { opacity: 0.88; }
    .btn:active:not(:disabled) { transform: translateY(1px); box-shadow: var(--shadow-press); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #FF8C78 0%, #FFB5A7 100%);
      color: #fff;
      border-top: 1px solid rgba(255,255,255,0.60);
      box-shadow: var(--shadow-clay);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.10);
      border-top: 1px solid rgba(255,255,255,0.80);
      color: var(--text-muted);
      box-shadow: var(--shadow-clay);
    }
    .btn-success {
      background: linear-gradient(135deg, #5DCEA8 0%, #A3E4D7 100%);
      color: #fff;
      border-top: 1px solid rgba(255,255,255,0.60);
      box-shadow: var(--shadow-clay);
    }
    .btn-danger {
      background: rgba(255,100,80,0.10);
      border: 1px solid rgba(200,60,40,0.18);
      color: #C0392B;
    }
    .btn-full   { width: 100%; }
    .btn-raffle { padding: 12px 28px; font-size: 0.95rem; }
    .btn-sm     { padding: 6px 11px; font-size: var(--fs-sm); }

    /* ══════════════════════════════════════
       CENTER — CARD GRID
    ══════════════════════════════════════ */
    .card-grid-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 0;
      position: relative;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(var(--card-cols, 4), var(--card-w, 120px));
      gap: var(--gap);
      place-content: center;
    }

    .empty-state {
      color: var(--text-dim);
      font-size: 1.00rem;
      text-align: center;
      line-height: 1.9;
    }

    /* ── Card ── */
    .card {
      width: var(--card-w, 120px);
      aspect-ratio: 2/3;
      perspective: 1200px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background-image: var(--card-b-img);
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255,255,255,0.60);
      box-shadow: var(--shadow-clay);
    }

    .card-front {
      transform: rotateY(180deg);
      background-image: var(--card-f-img);
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255,255,255,0.60);
      box-shadow: var(--shadow-clay);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .card-nickname {
      font-size: clamp(0.75rem, calc(var(--card-w, 120px) * 0.11), 2rem);
      font-weight: 700;
      color: #4A3F35;
      text-align: center;
      word-break: break-all;
      text-shadow: 0 1px 4px rgba(255,255,255,0.80);
      line-height: 1.3;
    }

    /* winner bounce state */
    .card.winner-glow {
      animation: winner-bounce 0.8s ease-in-out infinite alternate;
    }
    @keyframes winner-bounce {
      from {
        transform: translateY(0) scale(1.0);
        filter: drop-shadow(0 4px 14px rgba(255,140,120,0.55));
      }
      to {
        transform: translateY(-7px) scale(1.04);
        filter: drop-shadow(0 10px 24px rgba(93,206,168,0.65));
      }
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 20px;
      border-top: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .skip-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-sm);
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .skip-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ══════════════════════════════════════
       RIGHT PANEL — LIST MANAGEMENT
    ══════════════════════════════════════ */
    .list-block {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 6px;
    }
    .list-block.upper-block { flex: 1; }
    .list-block.lower-block { flex: 1; }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .list-count {
      font-size: var(--fs-label);
      font-weight: 600;
      color: var(--text-muted);
      background: rgba(255,255,255,0.60);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 1px 8px;
      box-shadow: var(--shadow-clay);
    }

    .list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 0;
      padding-right: 2px;
    }
    .list::-webkit-scrollbar { width: 3px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: rgba(255,140,120,0.35); border-radius: 2px; }

    .list-item {
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: var(--fs-body);
      color: var(--text-muted);
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      user-select: none;
      word-break: break-all;
      line-height: 1.4;
    }
    .list-item:hover { background: rgba(255,140,120,0.10); }
    .list-item.selected {
      background: rgba(255,140,120,0.20);
      border-color: rgba(255,140,120,0.50);
      color: var(--text);
    }

    /* highlight: duplicate in lower list */
    .list-item.highlight {
      animation: hl-flash 0.35s ease-in-out 5;
    }
    @keyframes hl-flash {
      0%, 100% { background: rgba(240,200,74,0.10); border-color: rgba(240,200,74,0.20); }
      50%       { background: rgba(240,200,74,0.30); border-color: rgba(240,200,74,0.60); color: #8B6914; }
    }

    .divider {
      height: 1px;
      background: rgba(0,0,0,0.08);
      flex-shrink: 0;
      margin: 2px 0;
    }

    .move-controls {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .move-controls .btn { flex: 1; }

    .list-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .list-actions .btn { flex: 1; min-width: 0; }

    /* ══════════════════════════════════════
       FLOATING NAV
    ══════════════════════════════════════ */
    .float-nav {
      position: fixed;
      right: 0;
      top: 38%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0,0,0,0.08);
      border-right: none;
      border-top: 1px solid rgba(255,255,255,0.80);
      border-radius: 12px 0 0 12px;
      padding: 10px 6px;
      box-shadow: var(--shadow-clay);
      z-index: 100;
    }
    .float-nav-item {
      display: block;
      padding: 10px 14px;
      font-size: var(--fs-nav);
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      color: var(--text-muted);
      transition: background 0.15s;
      cursor: pointer;
    }
    .float-nav-item.current {
      background: rgba(255,140,120,0.15);
      color: var(--accent);
    }
    .float-nav-item:not(.current):hover { background: rgba(255,140,120,0.10); }

    /* ══════════════════════════════════════
       CINEMA OVERLAY
    ══════════════════════════════════════ */
    #cinemaOverlay {
      display: none;
      opacity: 0;
      position: fixed;
      inset: 0;
      z-index: 500;
      pointer-events: none;
      background: radial-gradient(ellipse 55% 55% at 50% 50%,
        transparent 0%,
        rgba(30, 20, 15, 0.72) 100%);
    }

    /* ══════════════════════════════════════
       ROUND COUNTER
    ══════════════════════════════════════ */
    .round-counter {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
    }
    .round-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .round-num {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
    }

    /* ══════════════════════════════════════
       WINNER OVERLAY
    ══════════════════════════════════════ */
    .winner-overlay {
      display: none;
      position: fixed;
      bottom: 13%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1500;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }
    .winner-overlay span {
      font-size: clamp(2.6rem, 5.5vw, 5rem);
      font-weight: 800;
      color: #fff;
      text-shadow:
        0 0 50px rgba(255,140,120,0.95),
        0 0 25px rgba(255,140,120,0.70),
        0 4px 20px rgba(0,0,0,0.85),
        0 2px 4px rgba(0,0,0,1.0);
    }

    /* ══════════════════════════════════════
       BROADCAST MODE
    ══════════════════════════════════════ */
    .broadcast-controls {
      display: none;
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      gap: 12px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.80);
      border-radius: 999px;
      padding: 10px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    body.broadcast-mode .panel-left,
    body.broadcast-mode .panel-right { display: none !important; }
    body.broadcast-mode .dashboard   { grid-template-columns: 1fr; }
    body.broadcast-mode .controls    { display: none; }
    body.broadcast-mode .float-nav   { display: none; }
    body.broadcast-mode #broadcastControls { display: flex; }

    body.broadcast-mode::before {
      content: 'Round ' attr(data-round);
      position: fixed;
      top: 20px;
      left: 28px;
      font-family: 'Pretendard', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      opacity: 0.75;
      z-index: 200;
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════════
       MOBILE TABS
    ══════════════════════════════════════ */
    .mobile-tabs { display: none; }

    @media (max-width: 767px) {
      .mobile-tabs {
        display: flex;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 200;
        height: 48px;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0,0,0,0.08);
      }
      .tab-btn {
        flex: 1;
        height: 100%;
        border: none;
        background: none;
        font-family: inherit;
        font-size: 0.90rem;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }
      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .dashboard {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
        margin-top: 48px;
        height: calc(100vh - 48px);
      }

      /* 모든 패널 기본 숨김 */
      .panel-left, .center, .panel-right {
        display: none;
        grid-column: 1;
        grid-row: 1;
      }
      /* JS가 .tab-active 부착 시 표시 */
      .panel-left.tab-active,
      .center.tab-active,
      .panel-right.tab-active {
        display: flex;
      }

      /* 컨트롤 바 모바일 조정 */
      .controls {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 12px;
      }
      .btn-raffle { flex: 1 1 auto; }

      /* float-nav → 우하단 수평 */
      .float-nav {
        top: auto;
        bottom: 16px;
        transform: none;
        flex-direction: row;
        border-radius: 999px 0 0 999px;
        border-right: none;
        padding: 6px 8px;
      }
    }
  </style>
</head>
<body>
<div id="cinemaOverlay"></div>
<div id="winnerOverlay" class="winner-overlay"><span id="winnerOverlayName"></span></div>

<!-- 모바일 탭 바 -->
<div class="mobile-tabs" id="mobileTabs">
  <button class="tab-btn" data-panel="left">입력</button>
  <button class="tab-btn active" data-panel="center">추첨판</button>
  <button class="tab-btn" data-panel="right">명단</button>
</div>

<div class="dashboard">

  <!-- ══ LEFT PANEL ══ -->
  <aside class="panel panel-left">
    <div class="setting-group">
      <p class="panel-label">당첨자 수</p>
      <input type="number" id="winnerCountInput" class="num-input" min="1" value="1">
    </div>

    <div class="textarea-wrap">
      <p class="panel-label">참가자 입력 (한 줄에 한 명)</p>
      <textarea
        id="nicknameInput"
        class="nickname-textarea"
        placeholder="닉네임을 한 줄씩 붙여넣으세요&#10;Ctrl+Enter 로 빠르게 추가"
      ></textarea>
    </div>

    <button id="addBtn" class="btn btn-primary btn-full">참가자 추가</button>
  </aside>

  <!-- ══ CENTER ══ -->
  <main class="center">
    <div class="card-grid-wrap" id="cardGridWrap">
      <div class="card-grid" id="cardGrid">
        <p class="empty-state">참가자를 입력하고<br>추가 버튼을 눌러주세요</p>
      </div>
    </div>

    <div class="controls">
      <a href="index.html" class="btn btn-secondary">← 메인</a>
      <label class="skip-label">
        <input type="checkbox" id="skipCheck"> 스킵
      </label>
      <div class="round-counter">
        <span class="round-label">Round</span>
        <span class="round-num" id="roundNum">1</span>
      </div>
      <button id="raffleBtn" class="btn btn-primary btn-raffle">추첨 시작</button>
      <button id="confirmBtn" class="btn btn-success btn-raffle" style="display:none">결과 확정</button>
      <button id="broadcastBtn" class="btn btn-secondary" title="UI 숨기기 (B)">UI 숨기기</button>
    </div>
  </main>

  <!-- ══ RIGHT PANEL ══ -->
  <aside class="panel panel-right">

    <div class="list-block upper-block">
      <div class="list-header">
        <p class="panel-label">대기열</p>
        <span class="list-count" id="upperCount">0</span>
      </div>
      <ul class="list" id="upperList"></ul>
    </div>

    <div class="move-controls">
      <button id="moveUpBtn"   class="btn btn-secondary btn-sm" disabled>↑ 복귀</button>
      <button id="moveDownBtn" class="btn btn-secondary btn-sm" disabled>↓ 제외</button>
    </div>

    <div class="divider"></div>

    <div class="list-block lower-block">
      <div class="list-header">
        <p class="panel-label">당첨 / 제외</p>
        <span class="list-count" id="lowerCount">0</span>
      </div>
      <ul class="list" id="lowerList"></ul>
    </div>

    <div class="list-actions">
      <button id="restoreAllBtn" class="btn btn-secondary btn-sm">전체 복귀</button>
      <button id="resetLowerBtn" class="btn btn-danger btn-sm">하단 초기화</button>
      <button id="resetAllBtn"   class="btn btn-danger btn-sm">전체 초기화</button>
    </div>

  </aside>
</div>

<nav class="float-nav">
  <a href="index.html" class="float-nav-item">메인</a>
  <span class="float-nav-item current">추첨</span>
</nav>

<!-- 방송 모드 전용 플로팅 컨트롤 -->
<div id="broadcastControls" class="broadcast-controls">
  <button id="bc-raffle"  class="btn btn-primary btn-raffle">추첨 시작</button>
  <button id="bc-confirm" class="btn btn-success  btn-raffle" style="display:none">결과 확정</button>
  <button id="bc-exit"    class="btn btn-secondary">✕ 해제</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const state = {
  participants:   [],       // 상단 대기열 (string[])
  winners:        [],       // 하단 당첨/제외 (string[])
  settings:       { winnerCount: 1 },
  selected:       null,     // { nickname, from: 'upper'|'lower' }
  pendingWinners: [],       // 애니메이션 후 확정 대기
  uiMode:         'idle',   // 'idle' | 'running' | 'confirming'
  round:          1,        // 회차 카운터
  broadcastMode:  false,    // UI 숨기기
};

const cardMap = new Map(); // nickname -> card DOM element

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
const tw = (target, vars) =>
  new Promise(res => gsap.to(target, { ...vars, onComplete: res }));

const wait = ms => new Promise(res => setTimeout(res, ms));

function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ══════════════════════════════════════════
// LOCAL STORAGE
// ══════════════════════════════════════════
function saveState() {
  try {
    localStorage.setItem('kangHeeDay_participants', JSON.stringify(state.participants));
    localStorage.setItem('kangHeeDay_winners',      JSON.stringify(state.winners));
    localStorage.setItem('kangHeeDay_settings',     JSON.stringify(state.settings));
    localStorage.setItem('kangHeeDay_round',        JSON.stringify(state.round));
  } catch { /* storage full — ignore */ }
}

function loadState() {
  try {
    const p = localStorage.getItem('kangHeeDay_participants');
    const w = localStorage.getItem('kangHeeDay_winners');
    const s = localStorage.getItem('kangHeeDay_settings');
    const r = localStorage.getItem('kangHeeDay_round');
    if (p) state.participants = JSON.parse(p);
    if (w) state.winners      = JSON.parse(w);
    if (s) state.settings     = { ...state.settings, ...JSON.parse(s) };
    if (r) state.round        = JSON.parse(r);
  } catch { /* corrupt data — ignore */ }
}

// ══════════════════════════════════════════
// CARD GRID SIZING
// ══════════════════════════════════════════
function updateCardGridSize() {
  const wrap  = document.getElementById('cardGridWrap');
  const grid  = document.getElementById('cardGrid');
  const count = state.participants.length;
  if (count === 0) return;

  const areaW   = wrap.clientWidth  - 48;
  const areaH   = wrap.clientHeight - 48;
  const gap      = 10;
  const maxCardW = 300;

  let bestCols = 1, bestW = 0;

  for (let cols = 1; cols <= Math.min(count, 10); cols++) {
    const rows   = Math.ceil(count / cols);
    const byW    = (areaW - gap * (cols - 1)) / cols;
    const byH    = ((areaH - gap * (rows - 1)) / rows) * (2 / 3);
    const cardW  = Math.min(byW, byH, maxCardW);
    if (cardW > bestW) { bestCols = cols; bestW = cardW; }
  }

  grid.style.setProperty('--card-cols', bestCols);
  grid.style.setProperty('--card-w', Math.floor(bestW) + 'px');
}

// ══════════════════════════════════════════
// CARD DOM
// ══════════════════════════════════════════
function createCard(nickname) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.nickname = nickname;
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back"></div>
      <div class="card-face card-front">
        <span class="card-nickname">${escapeHtml(nickname)}</span>
      </div>
    </div>`;
  cardMap.set(nickname, card);
  return card;
}

function renderCards(animateIn = false) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  cardMap.clear();

  if (state.participants.length === 0) {
    grid.innerHTML = '<p class="empty-state">참가자를 입력하고<br>추가 버튼을 눌러주세요</p>';
    return;
  }

  state.participants.forEach(nick => grid.appendChild(createCard(nick)));
  updateCardGridSize();

  if (animateIn) {
    gsap.from(grid.querySelectorAll('.card'), {
      opacity: 0,
      scale: 0.82,
      duration: 0.38,
      stagger: { each: 0.03, from: 'random' },
      ease: 'back.out(2.0)',
    });
  }
  updateRaffleButtonState();
}

// ══════════════════════════════════════════
// LIST RENDER
// ══════════════════════════════════════════
function renderLists() {
  renderUpper();
  renderLower();
  updateMoveButtons();
}

function renderUpper() {
  const ul = document.getElementById('upperList');
  ul.innerHTML = '';
  const sorted = [...state.participants].sort((a, b) => a.localeCompare(b, 'ko'));
  sorted.forEach(nick => ul.appendChild(makeListItem(nick, 'upper')));
  document.getElementById('upperCount').textContent = state.participants.length;
}

function renderLower() {
  const ul = document.getElementById('lowerList');
  ul.innerHTML = '';
  state.winners.forEach(nick => ul.appendChild(makeListItem(nick, 'lower')));
  document.getElementById('lowerCount').textContent = state.winners.length;
}

function makeListItem(nickname, from) {
  const li = document.createElement('li');
  li.className = 'list-item';
  li.dataset.nickname = nickname;
  li.textContent = nickname;

  const isSelected =
    state.selected?.nickname === nickname &&
    state.selected?.from === from;
  if (isSelected) li.classList.add('selected');

  li.addEventListener('click', () => {
    if (state.uiMode !== 'idle') return;
    state.selected = isSelected ? null : { nickname, from };
    renderLists();
  });

  // 더블클릭: 클립보드 복사 (하단 당첨 목록에서 유용)
  li.addEventListener('dblclick', async () => {
    try {
      await navigator.clipboard.writeText(nickname);
    } catch {
      const ta = document.createElement('textarea');
      Object.assign(ta.style, { position: 'fixed', top: '-9999px' });
      ta.value = nickname;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    li.style.background = 'rgba(93,206,168,0.28)';
    setTimeout(() => { li.style.background = ''; }, 700);
  });

  return li;
}

function updateMoveButtons() {
  const sel = state.selected;
  document.getElementById('moveUpBtn').disabled   = !sel || sel.from !== 'lower';
  document.getElementById('moveDownBtn').disabled = !sel || sel.from !== 'upper';
}

function renderAll(animateCards = false) {
  renderCards(animateCards);
  renderLists();
}

// ══════════════════════════════════════════
// UI MODE
// ══════════════════════════════════════════
function setUIMode(mode) {
  state.uiMode = mode;
  const idle       = mode === 'idle';
  const confirming = mode === 'confirming';

  // Left panel
  document.getElementById('winnerCountInput').disabled = !idle;
  document.getElementById('nicknameInput').disabled    = !idle;
  document.getElementById('addBtn').disabled           = !idle;

  // Center
  const raffleBtn  = document.getElementById('raffleBtn');
  const confirmBtn = document.getElementById('confirmBtn');
  raffleBtn.style.display  = confirming ? 'none' : '';
  raffleBtn.disabled       = !idle;
  confirmBtn.style.display = confirming ? '' : 'none';

  // Right
  const disableRight = !idle;
  document.getElementById('moveUpBtn').disabled     = disableRight;
  document.getElementById('moveDownBtn').disabled   = disableRight;
  document.getElementById('restoreAllBtn').disabled = disableRight;
  document.getElementById('resetLowerBtn').disabled = disableRight;
  document.getElementById('resetAllBtn').disabled   = disableRight;

  if (idle) updateMoveButtons();
  updateRaffleButtonState();
  syncBroadcastControls();
}

// ══════════════════════════════════════════
// CINEMATIC HELPERS
// ══════════════════════════════════════════

function burstParticles(cx, cy) {
  const colors = ['#FF8C78','#5DCEA8','#F0C84A','#FFB5A7','#ffffff'];
  const shapes = ['●','✦','✿','♡'];
  const count  = 20;
  for (let i = 0; i < count; i++) {
    const el    = document.createElement('span');
    const angle = (i / count) * 360;
    const dist  = 70 + Math.random() * 90;
    const dx    = Math.cos(angle * Math.PI / 180) * dist;
    const dy    = Math.sin(angle * Math.PI / 180) * dist;
    el.textContent = shapes[i % shapes.length];
    el.style.cssText = `
      position:fixed;
      left:${cx}px; top:${cy}px;
      font-size:${10 + Math.random() * 10}px;
      color:${colors[i % colors.length]};
      pointer-events:none;
      z-index:2000;
      transform:translate(-50%,-50%);
    `;
    document.body.appendChild(el);
    gsap.to(el, {
      x: dx, y: dy,
      opacity: 0,
      scale: 0.2,
      duration: 0.65 + Math.random() * 0.4,
      ease: 'power2.out',
      onComplete: () => el.remove(),
    });
  }
}

function createHeroClone(card) {
  const rect  = card.getBoundingClientRect();
  const clone = card.cloneNode(true);
  clone.id    = 'heroClone';
  clone.style.cssText = `
    position: fixed;
    left: ${rect.left}px;
    top: ${rect.top}px;
    width: ${rect.width}px;
    height: ${rect.height}px;
    z-index: 1000;
    pointer-events: none;
    margin: 0;
    border-radius: 12px;
  `;
  document.body.appendChild(clone);

  // 히어로 카드: 앞면 닉네임을 방송에서 읽히는 크기로 고정
  const heroNick = clone.querySelector('.card-nickname');
  if (heroNick) heroNick.style.fontSize = '3.3rem';

  return { clone, rect };
}

async function heroReveal(winnerCards) {
  const overlayEl   = document.getElementById('winnerOverlay');
  const overlayName = document.getElementById('winnerOverlayName');

  for (const card of winnerCards) {
    const { clone, rect } = createHeroClone(card);
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const targetW = Math.min(vw * 0.30, 340);
    const targetH = targetW * 1.5;
    const targetX = (vw - targetW) / 2;
    const targetY = (vh - targetH) / 2;

    // 중앙으로 비행
    await tw(clone, {
      left: targetX, top: targetY,
      width: targetW, height: targetH,
      duration: 0.38, ease: 'power3.out',
    });

    // 뒤집기: 90°에서 잠시 멈춤
    const inner = clone.querySelector('.card-inner');
    await tw(inner, { rotateY: 90, duration: 0.22, ease: 'power2.in' });

    // 이름 오버레이 등장 (뒤집기 midpoint)
    overlayName.textContent = card.dataset.nickname;
    overlayEl.style.display = 'block';
    gsap.fromTo(overlayEl,
      { opacity: 0, y: 28, scale: 0.80 },
      { opacity: 1, y: 0,  scale: 1.0, duration: 0.32, ease: 'back.out(2.2)' }
    );

    await wait(80);
    await tw(inner, { rotateY: 180, duration: 0.30, ease: 'back.out(1.8)' });

    // 파티클 버스트
    burstParticles(targetX + targetW / 2, targetY + targetH / 2);

    await wait(520); // 감상 시간

    // 이름 오버레이 페이드아웃 + 원위치 복귀 동시에
    gsap.to(overlayEl, {
      opacity: 0, y: -12, duration: 0.22, ease: 'power2.in',
      onComplete: () => { overlayEl.style.display = 'none'; },
    });

    await tw(clone, {
      left: rect.left, top: rect.top,
      width: rect.width, height: rect.height,
      opacity: 0,
      duration: 0.30, ease: 'power2.in',
    });
    clone.remove();

    // 원본 카드 앞면 전환
    gsap.set(card.querySelector('.card-inner'), { rotateY: 180 });
    card.classList.add('winner-glow');
    gsap.set(card, { scale: 1 });

    await wait(150);
  }
}

// ══════════════════════════════════════════
// ANIMATION PHASES
// ══════════════════════════════════════════

// Phase 1 — Float (≈1s): 카드가 공중에서 유영
async function phase1Float(cards) {
  await tw(cards, {
    y: -12,
    duration: 0.5,
    ease: 'sine.inOut',
    stagger: { each: 0.04, from: 'center' },
  });
  await tw(cards, {
    y: 0,
    duration: 0.5,
    ease: 'sine.inOut',
    stagger: { each: 0.04, from: 'center' },
  });
}

// Phase 2 — Shuffle (≈2s): 실제 위치 스왑 (FLIP technique, 4라운드)
async function phase2Shuffle(cards) {
  const grid = document.getElementById('cardGrid');

  for (let round = 0; round < 4; round++) {
    // FIRST: 현재 화면 위치 기록
    const firstRects = cards.map(c => c.getBoundingClientRect());

    // 피셔-예이츠 랜덤 DOM 재배치
    const arr = [...cards];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    arr.forEach(c => grid.appendChild(c));

    // LAST: 새 위치 기록
    const lastRects = cards.map(c => c.getBoundingClientRect());

    // INVERT: 이전 위치로 순간이동 (시각적으로 원래 자리처럼 보이게)
    cards.forEach((card, i) => {
      gsap.set(card, {
        x: firstRects[i].left - lastRects[i].left,
        y: firstRects[i].top  - lastRects[i].top,
        rotation: (Math.random() - 0.5) * 16,
      });
    });

    // PLAY: 새 위치로 부드럽게 이동
    const isLast = round === 3;
    await tw(cards, {
      x: 0, y: 0, rotation: 0,
      duration: isLast ? 0.32 : 0.22,
      ease:     isLast ? 'back.out(1.4)' : 'power2.inOut',
      stagger:  { each: 0.015, from: 'random' },
    });

    if (!isLast) await wait(55);
  }
}

// Phase 3 — Tension (≈0.5s): 화면 진동 + 시네마 오버레이 + 당첨 카드 강조
async function phase3Tension(winnerCards) {
  // 시네마 오버레이 페이드인
  const overlay = document.getElementById('cinemaOverlay');
  overlay.style.display = 'block';
  gsap.to(overlay, { opacity: 1, duration: 0.35 });

  // 그리드 진동
  const grid = document.getElementById('cardGrid');
  for (let i = 0; i < 7; i++) {
    await tw(grid, {
      x: i % 2 === 0 ? -8 : 8,
      duration: 0.055,
      ease: 'none',
    });
  }
  await tw(grid, { x: 0, duration: 0.08, ease: 'power2.out' });

  // 당첨 카드만 살짝 앞으로 강조
  gsap.to(winnerCards, { scale: 1.06, duration: 0.25, ease: 'back.out(2.0)' });
  await wait(150);
}

// Phase 4 — Open: 낙첨 퇴장 → Hero Card 순서 공개 → overlay 제거
async function phase4Open(winnerCards, loserCards) {
  // 낙첨 카드 → blur + 아래로 퇴장
  if (loserCards.length > 0) {
    await tw(loserCards, {
      y: 70, opacity: 0,
      filter: 'blur(4px)',
      duration: 0.4,
      ease: 'power2.in',
      stagger: { each: 0.02, from: 'random' },
    });
  }

  // Hero Card 루프 — 한 명씩 순서대로 공개
  await heroReveal(winnerCards);

  // 시네마 오버레이 제거
  const overlay = document.getElementById('cinemaOverlay');
  await new Promise(res => gsap.to(overlay, {
    opacity: 0, duration: 0.4,
    onComplete: () => {
      overlay.style.opacity = '';
      overlay.style.display = 'none';
      res();
    },
  }));

  await wait(150);
}

// ══════════════════════════════════════════
// RAFFLE LOGIC
// ══════════════════════════════════════════
function pickWinners(count) {
  const pool = [...state.participants];
  const picked = [];
  const actual = Math.min(count, pool.length);
  for (let i = 0; i < actual; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(idx, 1)[0]);
  }
  return picked;
}

function flashInputError(inputEl) {
  inputEl.style.borderColor = '#E74C3C';
  inputEl.style.boxShadow   = '0 0 0 3px rgba(231,76,60,0.20)';
  setTimeout(() => {
    inputEl.style.borderColor = '';
    inputEl.style.boxShadow   = '';
  }, 2000);
}

async function startRaffle() {
  const countInput = document.getElementById('winnerCountInput');
  const count = parseInt(countInput.value, 10);

  if (!count || count < 1) {
    flashInputError(countInput); return;
  }
  if (state.participants.length === 0) return;
  if (count > state.participants.length) {
    flashInputError(countInput); return;
  }

  const winnerNicks = pickWinners(count);
  const skip = document.getElementById('skipCheck').checked;
  const allCards = [...document.querySelectorAll('.card')];
  const winnerCards = winnerNicks.map(n => cardMap.get(n)).filter(Boolean);
  const loserCards  = allCards.filter(c => !winnerCards.includes(c));

  if (skip) {
    // 스킵: 애니메이션 없이 즉시 결과 표시
    gsap.set(loserCards, { y: 60, opacity: 0 });
    winnerCards.forEach(card => {
      gsap.set(card.querySelector('.card-inner'), { rotateY: 180 });
      card.classList.add('winner-glow');
    });
    state.pendingWinners = winnerNicks;
    setUIMode('confirming');
  } else {
    // 전체 애니메이션
    switchMobileTab('center');
    setUIMode('running');
    await phase1Float(allCards);
    await phase2Shuffle(allCards);
    await phase3Tension(winnerCards);
    await phase4Open(winnerCards, loserCards);
    state.pendingWinners = winnerNicks;
    setUIMode('confirming');
  }
}

async function confirmResults() {
  const confirmed = state.pendingWinners;
  const winnerCards = confirmed.map(n => cardMap.get(n)).filter(Boolean);

  // 당첨 카드 애니메이션 아웃
  if (winnerCards.length > 0) {
    await tw(winnerCards, {
      scale: 0.75, opacity: 0, y: -20,
      duration: 0.3,
      stagger: 0.04,
      ease: 'power2.in',
    });
  }

  // 상태 업데이트
  state.winners.push(...confirmed);
  state.participants = state.participants.filter(n => !confirmed.includes(n));
  state.pendingWinners = [];
  state.selected = null;

  // 회차 증가
  state.round += 1;
  document.getElementById('roundNum').textContent = state.round;
  document.body.setAttribute('data-round', state.round);

  saveState();
  renderAll(true);
  setUIMode('idle');
}

// ══════════════════════════════════════════
// PARTICIPANT MANAGEMENT
// ══════════════════════════════════════════
function addParticipants() {
  const raw   = document.getElementById('nicknameInput').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) return;

  const lowerSet = new Set(state.winners);
  const upperSet = new Set(state.participants);
  const dupes = [], added = [];

  for (const nick of lines) {
    if (lowerSet.has(nick)) {
      dupes.push(nick);
    } else if (!upperSet.has(nick)) {
      added.push(nick);
      upperSet.add(nick);
    }
    // 이미 상단에 있으면 무시 (중복 제거)
  }

  state.participants.push(...added);
  document.getElementById('nicknameInput').value = '';
  saveState();
  renderAll(added.length > 0);

  if (dupes.length > 0) highlightLower(dupes);

  // 추가 피드백
  if (added.length > 0) {
    const btn  = document.getElementById('addBtn');
    const orig = btn.textContent;
    btn.textContent = `✓ ${added.length}명 추가됨`;
    btn.disabled = true;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1200);
  }
}

function highlightLower(nicks) {
  const ul = document.getElementById('lowerList');
  nicks.forEach(nick => {
    const item = [...ul.querySelectorAll('.list-item')]
      .find(li => li.dataset.nickname === nick);
    if (!item) return;
    item.classList.remove('highlight');
    void item.offsetWidth; // reflow
    item.classList.add('highlight');
    item.addEventListener('animationend', () => item.classList.remove('highlight'), { once: true });
    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  });
}

function moveToLower() {
  if (!state.selected || state.selected.from !== 'upper') return;
  const nick = state.selected.nickname;
  state.participants = state.participants.filter(n => n !== nick);
  state.winners.push(nick);
  state.selected = null;
  saveState();
  renderAll(false);
}

function moveToUpper() {
  if (!state.selected || state.selected.from !== 'lower') return;
  const nick = state.selected.nickname;
  state.winners = state.winners.filter(n => n !== nick);
  state.participants.push(nick);
  state.selected = null;
  saveState();
  renderAll(true);
}

function resetLower() {
  if (!confirm('하단 리스트를 초기화하시겠습니까?')) return;
  state.winners  = [];
  state.selected = null;
  saveState();
  renderLists();
}

function resetAll() {
  if (!confirm('전체를 초기화하시겠습니까?')) return;
  state.participants   = [];
  state.winners        = [];
  state.selected       = null;
  state.pendingWinners = [];
  state.round          = 1;
  document.getElementById('roundNum').textContent = '1';
  document.body.setAttribute('data-round', '1');
  saveState();
  renderAll(false);
  setUIMode('idle');
}

function restoreAll() {
  if (state.winners.length === 0) return;
  state.participants.push(...state.winners);
  state.winners  = [];
  state.selected = null;
  saveState();
  renderAll(true);
}

// ══════════════════════════════════════════
// ASSET CHECK (이미지 폴백)
// ══════════════════════════════════════════
function checkImage(src, cssVar) {
  const img = new Image();
  img.onload = () =>
    document.documentElement.style.setProperty(cssVar, `url("${src}")`);
  img.src = src;
}

// ══════════════════════════════════════════
// BROADCAST MODE
// ══════════════════════════════════════════
function toggleBroadcastMode() {
  state.broadcastMode = !state.broadcastMode;
  document.body.classList.toggle('broadcast-mode', state.broadcastMode);
  document.getElementById('broadcastBtn').textContent =
    state.broadcastMode ? '✕ UI 숨기기' : 'UI 숨기기';
  syncBroadcastControls();
  // 패널 숨김 후 카드 그리드 너비 재계산
  requestAnimationFrame(() => requestAnimationFrame(updateCardGridSize));
}

function syncBroadcastControls() {
  const raffleBtn  = document.getElementById('raffleBtn');
  const confirmBtn = document.getElementById('confirmBtn');
  const bcRaffle   = document.getElementById('bc-raffle');
  const bcConfirm  = document.getElementById('bc-confirm');
  bcRaffle.style.display  = raffleBtn.style.display  !== 'none' ? '' : 'none';
  bcConfirm.style.display = confirmBtn.style.display !== 'none' ? '' : 'none';
  bcRaffle.disabled  = raffleBtn.disabled;
  bcConfirm.disabled = confirmBtn.disabled;
}

function updateRaffleButtonState() {
  const empty = state.participants.length === 0;
  const btn   = document.getElementById('raffleBtn');
  btn.disabled = empty || state.uiMode !== 'idle';
  btn.title    = empty ? '참가자를 먼저 추가해주세요' : '추첨 시작 (Space)';
  syncBroadcastControls();
}

// ══════════════════════════════════════════
// MOBILE TABS
// ══════════════════════════════════════════
function switchMobileTab(panel) {
  if (window.innerWidth >= 768) return;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.panel === panel));
  document.querySelector('.panel-left')
    .classList.toggle('tab-active', panel === 'left');
  document.querySelector('.center')
    .classList.toggle('tab-active', panel === 'center');
  document.querySelector('.panel-right')
    .classList.toggle('tab-active', panel === 'right');
  if (panel === 'center') updateCardGridSize();
}

function initTabs() {
  if (window.innerWidth < 768) {
    switchMobileTab('center');
  }
}

// ══════════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════════
function bindEvents() {
  document.getElementById('addBtn')
    .addEventListener('click', addParticipants);

  document.getElementById('nicknameInput')
    .addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') addParticipants();
    });

  document.getElementById('winnerCountInput')
    .addEventListener('change', () => {
      state.settings.winnerCount =
        parseInt(document.getElementById('winnerCountInput').value, 10) || 1;
      saveState();
    });

  document.getElementById('raffleBtn')
    .addEventListener('click', startRaffle);

  document.getElementById('confirmBtn')
    .addEventListener('click', confirmResults);

  document.getElementById('moveUpBtn')
    .addEventListener('click', moveToUpper);

  document.getElementById('moveDownBtn')
    .addEventListener('click', moveToLower);

  document.getElementById('restoreAllBtn')
    .addEventListener('click', restoreAll);

  document.getElementById('resetLowerBtn')
    .addEventListener('click', resetLower);

  document.getElementById('resetAllBtn')
    .addEventListener('click', resetAll);

  // ── UI 숨기기
  document.getElementById('broadcastBtn').addEventListener('click', toggleBroadcastMode);
  document.getElementById('bc-exit').addEventListener('click', toggleBroadcastMode);
  document.getElementById('bc-raffle').addEventListener('click', startRaffle);
  document.getElementById('bc-confirm').addEventListener('click', confirmResults);

  // ── 모바일 탭
  document.querySelectorAll('.tab-btn').forEach(btn =>
    btn.addEventListener('click', () => switchMobileTab(btn.dataset.panel)));

  // ── 키보드 단축키
  document.addEventListener('keydown', e => {
    const isTyping = document.activeElement.tagName === 'TEXTAREA'
                  || document.activeElement.tagName === 'INPUT';
    if (isTyping) return;

    if (e.key === ' ') {
      e.preventDefault();
      if      (state.uiMode === 'idle' && state.participants.length > 0) startRaffle();
      else if (state.uiMode === 'confirming') confirmResults();
    }
    if (e.key === 'b' || e.key === 'B') toggleBroadcastMode();
    if (e.key === 'Escape' && state.broadcastMode) toggleBroadcastMode();
  });

  window.addEventListener('resize', () => {
    if (state.participants.length > 0) updateCardGridSize();
  });
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  loadState();
  document.getElementById('winnerCountInput').value =
    state.settings.winnerCount || 1;

  // 회차 초기화
  document.getElementById('roundNum').textContent = state.round;
  document.body.setAttribute('data-round', state.round);

  checkImage('card_b.webp', '--card-b-img');
  checkImage('card_f.webp', '--card-f-img');

  renderAll(false);
  bindEvents();

  // 모바일 초기 탭 상태 (중앙=추첨판 기본)
  initTabs();
}

init();
</script>
</body>
</html>
